name: Build IBO QUANTIC APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fL https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk IBO_QUANTIC.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IBO_QUANTIC_APK
          path: IBO_QUANTIC.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0
          name: IBO QUANTIC v1.0
          files: IBO_QUANTIC.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
